name: CI
run-name: ${{ github.actor }} triggered CI/CD on ${{ github.ref_name }}

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # Single-source the librealsense pin: parse it from config/docker/setup.conf
  # (the same [build] arg_N line the local build + bump script use) and expose
  # it as an output so the build-worker call FROMs the matching GHCR SDK. This
  # removes the old hardcoded `v2.58.2` literal that drifted from setup.conf /
  # the Dockerfile whenever bump_realsense_versions.sh moved the pin (#130).
  resolve-librealsense:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: parse
        run: |
          version="$(grep -oP '^\s*arg_[0-9]+\s*=\s*LIBREALSENSE_VERSION=\K\S+' \
            config/docker/setup.conf | head -1)"
          if [ -z "${version}" ]; then
            echo "resolve-librealsense: could not parse LIBREALSENSE_VERSION from config/docker/setup.conf" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Resolved librealsense version: ${version}"

  call-docker-build:
    needs: resolve-librealsense
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: humble, ros_distro: humble, ros_tag: ros-base, ubuntu_codename: jammy }
          - { name: jazzy,  ros_distro: jazzy,  ros_tag: ros-base, ubuntu_codename: noble }
    name: build (${{ matrix.target.name }})
    uses: ycpss91255-docker/base/.github/workflows/build-worker.yaml@v0.41.0
    with:
      image_name: realsense_ros2
      cache_variant: ${{ matrix.target.name }}
      platforms: linux/amd64,linux/arm64
      test_tools_version: v0.41.0
      # LIBREALSENSE_IMAGE resolves PER-PLATFORM from the matrix cell's
      # ubuntu_codename (jammy -> :<ver>-jammy, noble -> :<ver>-noble): the SDK
      # is a pure C++ library whose .so is ABI-bound to the Ubuntu release, not
      # the ROS distro, so it is keyed on the codename. CI PULLS the matching
      # prebuilt SDK published by build-librealsense.yaml instead of rebuilding
      # librealsense. The version comes from the `resolve-librealsense` job,
      # which parses config/docker/setup.conf -- the ONE canonical pin the local
      # build + bump script also read, so CI never drifts from it (#130). `needs`
      # context IS available in a reusable-workflow call's `with:`. Local builds
      # omit this arg -> the version-scoped Dockerfile default
      # `librealsense:${LIBREALSENSE_VERSION}-${UBUNTU_CODENAME}` (built by
      # script/hooks/pre/build.sh).
      build_args: |
        ROS_DISTRO=${{ matrix.target.ros_distro }}
        ROS_TAG=${{ matrix.target.ros_tag }}
        UBUNTU_CODENAME=${{ matrix.target.ubuntu_codename }}
        LIBREALSENSE_IMAGE=ghcr.io/ycpss91255-docker/librealsense:${{ needs.resolve-librealsense.outputs.version }}-${{ matrix.target.ubuntu_codename }}

  # Stable-named aggregator so branch protection's required status check does
  # not have to enumerate every matrix entry. Branch protection references
  # `ci-passed`; the build matrix shape can change without re-configuring it.
  ci-passed:
    needs: call-docker-build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - run: |
          if [ "${{ needs.call-docker-build.result }}" != "success" ]; then
            echo "One or more matrix builds failed (result=${{ needs.call-docker-build.result }})"
            exit 1
          fi
          echo "All matrix builds passed"

  call-release:
    needs: call-docker-build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    uses: ycpss91255-docker/base/.github/workflows/release-worker.yaml@v0.41.0
    with:
      archive_name_prefix: realsense_ros2
    secrets: inherit
