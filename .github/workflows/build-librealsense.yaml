name: Build librealsense SDK image

# Pre-builds the librealsense SDK ONCE per ROS 2 distro and publishes each to
# GHCR so the main repo build (and CI) consumes it as a prebuilt image instead
# of recompiling librealsense (~15-25 min) on every run. Two distros are
# published from the same SDK Dockerfile (parameterized by ROS_DISTRO):
#   humble (Ubuntu 22.04 jammy) -> librealsense:humble-${LIBREALSENSE_VERSION}
#   jazzy  (Ubuntu 24.04 noble) -> librealsense:jazzy-${LIBREALSENSE_VERSION}
#
# Per-arch NATIVE builds (linux/amd64 -> ubuntu-latest, linux/arm64 ->
# ubuntu-24.04-arm) mirror base's build-worker: no QEMU emulation. Each shard
# pushes an image by DIGEST, then a per-distro merge job assembles the
# multi-arch manifest under the tag ${distro}-${LIBREALSENSE_VERSION}.
#
# ONE-TIME OPERATIONAL PREREQUISITE (blocks the main CI build otherwise):
# GHCR packages first published via GITHUB_TOKEN are PRIVATE by default, and
# the main Dockerfile's `FROM ghcr.io/.../librealsense:${DISTRO}-v2.58.2` is
# pulled ANONYMOUSLY in CI (same as the base test-tools image). So the FIRST run
# of this workflow must complete AND the librealsense package must be flipped to
# PUBLIC (repo/org Packages -> librealsense -> Package settings -> Change
# visibility -> Public) BEFORE the main Dockerfile change lands on main --
# otherwise the main build fails at the FROM with `unauthorized`.
#
# Publish is gated to `main` (push trigger below): the SDK manifest is only
# (re)published from the protected branch, not from every feature branch that
# happens to touch these paths. Use workflow_dispatch to build ad hoc.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docker/librealsense/**"
      - ".github/workflows/build-librealsense.yaml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/ycpss91255-docker/librealsense
  LIBREALSENSE_VERSION: v2.58.2

jobs:
  # ────────────────────────────────────────────────────────────────
  # Per-distro, per-platform native build. Each shard pushes an untagged
  # image by digest; the merge job below stitches the digests belonging to
  # the same distro into one manifest.
  # ────────────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      # Two real axes (distro x arch) give the full 2x2 = 4-job product; the
      # `include` entries only map each arch to its native platform + runner
      # (they match on the existing `arch` value, so they EXTEND the matching
      # combinations rather than adding new standalone jobs).
      matrix:
        distro: [humble, jazzy]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish GATE: build the SDK Dockerfile's `test` stage (RUN-asserts the
      # /rs-full + /rs-stage trees are correct) WITHOUT pushing. A broken SDK
      # tree fails here, so the push step below never runs -- no bad image
      # reaches GHCR. Warms the shared `build` layer into the cache scope that
      # the push step then reuses.
      - name: Test SDK (publish gate, no push)
        uses: docker/build-push-action@v7
        with:
          context: docker/librealsense
          file: docker/librealsense/Dockerfile
          platforms: ${{ matrix.platform }}
          target: test
          push: false
          build-args: |
            ROS_DISTRO=${{ matrix.distro }}
            LIBREALSENSE_VERSION=${{ env.LIBREALSENSE_VERSION }}
          cache-from: type=gha,scope=librealsense-${{ matrix.distro }}-${{ matrix.arch }}
          cache-to: type=gha,scope=librealsense-${{ matrix.distro }}-${{ matrix.arch }},mode=max

      # Push the `export` (scratch) target: the published image is literally
      # just the two librealsense trees (/rs-full + /rs-stage), no ROS base or
      # build-deps -- the consumer only COPYs those trees. Reuses the cache the
      # gate step warmed, so the `build` stage is not recompiled here.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: docker/librealsense
          file: docker/librealsense/Dockerfile
          platforms: ${{ matrix.platform }}
          target: export
          build-args: |
            ROS_DISTRO=${{ matrix.distro }}
            LIBREALSENSE_VERSION=${{ env.LIBREALSENSE_VERSION }}
          cache-from: type=gha,scope=librealsense-${{ matrix.distro }}-${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.distro }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ────────────────────────────────────────────────────────────────
  # Merge the per-arch digests of each distro into a single multi-arch
  # manifest tagged ${distro}-${LIBREALSENSE_VERSION} (e.g. humble-v2.58.2,
  # jazzy-v2.58.2). One merge job per distro via the matrix.
  # ────────────────────────────────────────────────────────────────
  merge:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [humble, jazzy]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.distro }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          tag="${IMAGE}:${{ matrix.distro }}-${LIBREALSENSE_VERSION}"
          # shellcheck disable=SC2046
          docker buildx imagetools create -t "${tag}" \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect manifest
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMAGE}:${{ matrix.distro }}-${LIBREALSENSE_VERSION}"
