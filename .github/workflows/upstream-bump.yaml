name: Upstream RealSense bump

# dependabot's docker ecosystem cannot see the librealsense / realsense-ros
# tags embedded in the Dockerfile ARGs, so this bespoke scheduled workflow
# checks upstream releases and opens a bump PR when a newer tag appears. A
# second job flags drift of the vendored udev rules against the pinned SDK tag.

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:

  bump-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for newer upstream releases
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          out="$(script/bump_realsense_versions.sh)"
          code=$?
          set -e
          echo "${out}"
          if [ "${code}" -eq 0 ]; then
            # bump script emits a trailing abi_safe=<bool> line; split it out of
            # the human-facing summary and surface it as its own step output.
            abi_safe="$(printf '%s\n' "${out}" | sed -n 's/^abi_safe=//p')"
            summary="$(printf '%s\n' "${out}" | grep -v '^abi_safe=')"
            {
              echo "changed=true"
              echo "abi_safe=${abi_safe}"
              echo "summary<<EOF"
              echo "${summary}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          elif [ "${code}" -eq 10 ]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            exit "${code}"
          fi

      - name: Open bump PR
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SUMMARY: ${{ steps.bump.outputs.summary }}
          ABI_SAFE: ${{ steps.bump.outputs.abi_safe }}
        run: |
          branch="bump/realsense-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add Dockerfile doc/changelog/CHANGELOG.md
          git commit -m "chore(deps): bump pinned RealSense source versions"
          git push -u origin "${branch}"

          # realsense-ros PATCH (same declared realsense2 minor) -> let CI merge
          # it; a realsense-ros minor/major change pulls librealsense into a new
          # minor, so leave it for human review.
          if [ "${ABI_SAFE}" = "true" ]; then
            merge_note="realsense-ros patch (declared realsense2 minor unchanged): auto-merge is enabled -- CI green on the full matrix merges this with no human."
          else
            merge_note="realsense-ros minor/major change (declared realsense2 minor changed; librealsense follows into a new minor): auto-merge is NOT enabled -- left for human review."
          fi

          gh pr create \
            --title "chore(deps): bump pinned RealSense source versions" \
            --body "Automated bump of the pinned RealSense source tags (#97).
          realsense-ros drives the pair: librealsense is pinned to the minor
          realsense-ros declares via find_package(realsense2 X.Y.Z), so the combo
          is one upstream tested.

          ${SUMMARY}

          ${merge_note}

          Merge gate today: CI green on the full matrix
          (humble+jazzy x amd64+arm64). The D455-on-Pi5 aligned-depth hardware
          check is NOT machine-enforced -- auto-merge bypasses it -- and is
          deferred to the self-hosted hardware CI in #82. Risk: an ABI/behavioral
          regression that only surfaces on real hardware can reach main via
          auto-merge; until #82 exists a same-minor realsense-ros bump is treated
          as low-risk on that basis. If the udev-rules sync check reports drift,
          re-vendor config/realsense/udev/99-realsense-libusb.rules before merge."

          if [ "${ABI_SAFE}" = "true" ]; then
            gh pr merge --auto --squash "${branch}"
          fi

  check-udev-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Flag vendored udev-rules drift
        run: |
          if ! script/check_udev_rules_sync.sh; then
            echo "::warning file=config/realsense/udev/99-realsense-libusb.rules::Vendored RealSense udev rules have drifted from the pinned SDK tag; re-vendor from upstream."
          fi

  check-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Flag vendored config drift
        run: |
          if ! script/check_configs_sync.sh; then
            echo "::warning file=.github/upstream-baseline/config.yaml::Vendored RealSense example configs have drifted from the pinned realsense-ros tag; re-vendor from upstream."
          fi
