# USB 2.x fallback profile (ROS 2 param format). Rationale in ../README.md.
enable_color: true
rgb_camera.color_profile: 640x480x15      # 30 fps delivers 0 frames on USB 2; 15 streams
enable_depth: true
depth_module.depth_profile: 480x270x15    # depth dropped below color to fit USB 2
align_depth.enable: true
enable_infra1: false                      # IR off to stay within USB 2 bandwidth
enable_infra2: false
enable_gyro: false                        # IMU off to stay within USB 2 bandwidth
enable_accel: false
